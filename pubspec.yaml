name: memory_board
description: A portrait-first mobile visual memory puzzle game.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/memory_board_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/memory_board_icon.png
  adaptive_icon_background: "#071A1F"
  adaptive_icon_foreground: assets/branding/memory_board_icon.png
  min_sdk_android: 23

flutter_native_splash:
  color: "#071A1F"
  image: assets/branding/memory_board_icon.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#071A1F"
    image: assets/branding/memory_board_icon.png
