name: Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/cirruslabs/flutter:stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter version
        run: flutter --version

      - name: Ensure platform files
        run: flutter create --platforms=android,ios,web --org com.irina.memoryboard --project-name memory_board .

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: memory-board-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
